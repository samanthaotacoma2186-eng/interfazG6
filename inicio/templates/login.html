{% load static %}
{% include 'header.html' %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%; border: none;">
        
        <div class="text-center mb-4">
            <!-- Puedes descommentar esto si tienes un logo -->
            <!-- <img src="{% static 'img/logo.png' %}" alt="Logo" class="mb-3" style="height: 60px;"> -->
            <h3 class="fw-bold text-secondary">Iniciar Sesión</h3>
            <p class="text-muted small">Por favor, ingresa tus credenciales</p>
        </div>

        <form action="{% url 'login' %}" method="post"> 
            {% csrf_token %}
            
            <!-- Campo de Usuario -->
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-semibold">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" placeholder="Ej. juan123" name="username" required class="form-control bg-light border-start-0 ps-0">
                </div>
            </div>

            <!-- Campo de Contraseña -->
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" placeholder="••••••••" name="password" required class="form-control bg-light border-start-0 ps-0">
                </div>
            </div>

            <!-- Botón de Enviar -->
            <button type="submit" class="btn btn-success w-100 py-2 rounded-3 fw-bold shadow-sm">
                Entrar al Sistema
            </button>
        </form> 

        <!-- Mensajes de error o éxito -->
        {% if mensaje %}
            <div class="alert alert-danger mt-3 py-2 text-center small rounded-3" role="alert">
                {{ mensaje }}
            </div>
        {% endif %}

        <div class="text-center mt-3">
            <span class="small text-muted">¿No tienes cuenta?</span>
            <a href="{% url 'register' %}" class="small fw-semibold">Crear usuario</a>
        </div>
        
    </div>
</div>

{% include 'footer.html' %}
