{% load static %}
{% includejnm     'private/header.html' %}
<center>
<h1>Listado de usuarios</h1>
</center>

<table class="table table-striped table-bordered">
    <thead>
        <th>Codigo</th>
        <th>Nombre</th>
        <th>Correo</th>
    </thead>
    <tbody>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.email }}</td>
            <td> </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
